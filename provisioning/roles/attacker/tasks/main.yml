---
- name: Cài đặt công cụ phục vụ enumeration và crack mật khẩu
  ansible.builtin.apt:
    name:
      - hashcat
      - apache2
      - curl
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Kiểm tra tiến trình đang lắng nghe trên cổng 80
  ansible.builtin.shell: |
    ss -ltnp 'sport = :80' || true
  args:
    executable: /bin/bash
  register: port_80_status
  changed_when: false

- name: Dừng nginx nếu đang chiếm cổng 80
  ansible.builtin.systemd:
    name: nginx
    state: stopped
    enabled: false
  when: "'nginx' in port_80_status.stdout"
  failed_when: false

- name: Dừng Python HTTP server cũ nếu đang chiếm cổng 80
  ansible.builtin.shell: |
    pkill -f "python3 -m http.server 80" || true
  args:
    executable: /bin/bash
  when:
    - "'python' in port_80_status.stdout"
    - "'http.server' in port_80_status.stdout"
  changed_when: false

- name: Tạo thư mục DocumentRoot của Apache
  ansible.builtin.file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Tải linPEAS để attacker phục vụ qua HTTP
  ansible.builtin.get_url:
    url: https://github.com/peass-ng/PEASS-ng/releases/latest/download/linpeas.sh
    dest: /var/www/html/linpeas.sh
    owner: www-data
    group: www-data
    mode: '0755'
    timeout: 90
  register: linpeas_download
  retries: 3
  delay: 5
  until: linpeas_download is succeeded

