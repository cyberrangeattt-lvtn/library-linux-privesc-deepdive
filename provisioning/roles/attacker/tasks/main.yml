- name: Tạo cấu hình ServerName cho Apache
  ansible.builtin.copy:
    dest: /etc/apache2/conf-available/servername.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      ServerName attacker

- name: Bật cấu hình ServerName
  ansible.builtin.command:
    cmd: a2enconf servername
  register: enable_servername
  changed_when: "'Enabling conf servername' in enable_servername.stdout"

- name: Tạo lại VirtualHost mặc định của Apache
  ansible.builtin.copy:
    dest: /etc/apache2/sites-available/000-default.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      <VirtualHost *:80>
          ServerName attacker
          ServerAdmin webmaster@localhost
          DocumentRoot /var/www/html

          <Directory /var/www/html>
              Options Indexes FollowSymLinks
              AllowOverride None
              Require all granted
          </Directory>

          ErrorLog ${APACHE_LOG_DIR}/error.log
          CustomLog ${APACHE_LOG_DIR}/access.log combined
      </VirtualHost>

- name: Bật site mặc định của Apache
  ansible.builtin.command:
    cmd: a2ensite 000-default.conf
  register: enable_default_site
  changed_when: "'Enabling site 000-default' in enable_default_site.stdout"

- name: Tạo thư mục log cho Apache
  ansible.builtin.file:
    path: /var/log/apache2
    state: directory
    owner: root
    group: adm
    mode: '0750'

- name: Kiểm tra cú pháp cấu hình Apache
  ansible.builtin.command:
    cmd: apache2ctl configtest
  register: apache_configtest
  changed_when: false
  failed_when: apache_configtest.rc != 0

- name: Khởi động lại Apache
  ansible.builtin.systemd:
    name: apache2
    state: restarted
    enabled: true

- name: Chờ Apache mở cổng 80
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 80
    delay: 2
    timeout: 30

- name: Kiểm tra tải linPEAS qua Apache
  ansible.builtin.uri:
    url: http://127.0.0.1/linpeas.sh
    method: GET
    status_code: 200
    
- name: Add passwords file to the home directory
  copy:
    src: privesc.txt
    dest: /home/user/privesc.txt
    owner: user
    mode: '0644'

- name: Add password to passlist wordlist
  ansible.builtin.lineinfile:
    path: /home/user/privesc.txt
    line: R00tPassw0rdForCracking!
    create: true
